<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect with Sahil</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            height: 100%;
            background-color: #f9f9f9;
        }

        /* Home Button - Top Left */
        .home-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: #ff4757;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Full Screen Container */
        .contact-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 80px 20px 20px 20px; /* Top padding badha di hai button ke liye */
            text-align: center;
        }

        /* Top Headings Section */
        .header-section {
            margin-top: 10px;
        }

        .header-section h1 {
            font-size: 28px;
            color: #111;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .header-section p {
            font-size: 16px;
            color: #666;
            font-weight: 400;
        }

        /* Middle Icons Section */
        .buttons-section {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin: 40px 0;
        }

        /* Card Style */
        .contact-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 25px;
            border-radius: 20px;
            text-decoration: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        /* WhatsApp */
        .whatsapp-card { background-color: #e8faf0; border: 2px solid #25D366; }
        .whatsapp-card i { font-size: 60px; color: #25D366; margin-bottom: 12px; }
        .whatsapp-card span { font-size: 18px; color: #128C7E; font-weight: 600; }

        /* Instagram */
        .instagram-card { background-color: #fff0f5; border: 2px solid #E1306C; }
        .instagram-card i { font-size: 60px; color: #E1306C; margin-bottom: 12px; }
        .instagram-card span { font-size: 18px; color: #C13584; font-weight: 600; }

        /* Footer */
        .footer-black {
            background-color: #111;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            margin-top: auto;
        }
        .footer-black p { color: #ffffff; font-size: 13px; }
        .footer-black a { color: #38b6ff; text-decoration: underline; font-weight: 600; }
    </style>
</head>
<body>

    <!-- Home Button -->
    <a href="https://skansari123.github.io/Saree-ecom/index.html  " class="home-btn">
        <i class="fa-solid fa-arrow-left"></i> Home
    </a>

    <div class="contact-container">
        
        <div class="header-section">
            <h1>Let's Start Your Project!</h1>
            <p>Choose your preferred platform to connect instantly</p>
        </div>

        <div class="buttons-section">
            <a href="https://wa.me/917380879415" target="_blank" class="contact-card whatsapp-card">
                <i class="fa-brands fa-whatsapp"></i>
                <span>Chat on WhatsApp</span>
            </a>
            <a href="https://www.instagram.com/banarassilkart7?igsh=NmdidHcwNWpuenBt  " target="_blank" class="contact-card instagram-card">
                <i class="fa-brands fa-instagram"></i>
                <span>DM on Instagram</span>
            </a>
        </div>

        <footer class="footer-black">
            <p>Developed by: <a href="https://arifeen.vercel.app/" target="_blank">Shamsul Arifeen</a></p>
        </footer>

    </div>

</body>
</html>
